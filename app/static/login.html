<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourMove — تسجيل الدخول</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="login-page">
    <!-- Animated background orbs -->
    <div class="login-orb login-orb-1"></div>
    <div class="login-orb login-orb-2"></div>
    <div class="login-orb login-orb-3"></div>

    <div class="login-card">
        <div class="login-logo">
            <h1>YourMove</h1>
            <p>VR Assessment & Support Platform</p>
        </div>

        <!-- Tabs -->
        <div class="login-tabs">
            <button class="login-tab active" id="tab-login" onclick="showLogin()">تسجيل الدخول</button>
            <button class="login-tab" id="tab-register" onclick="showRegister()">إنشاء حساب</button>
        </div>

        <!-- Login Form -->
        <div id="login-form">
            <div class="form-group">
                <label class="form-label">البريد الإلكتروني</label>
                <input type="email" id="email" class="form-input" placeholder="doctor@example.com" autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">كلمة المرور</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••">
                <label style="display:flex;gap:6px;align-items:center;margin-top:8px;font-size:12px;color:var(--text-muted);">
                    <input type="checkbox" onchange="togglePassword('password', this.checked)">
                    إظهار كلمة المرور
                </label>
            </div>
            <div id="error-msg" style="color:var(--overwhelmed);font-size:13px;margin-bottom:12px;display:none;border-radius:8px;padding:8px 12px;background:rgba(239,68,68,0.08);"></div>
            <button class="btn btn-primary btn-lg" style="width:100%" onclick="doLogin()">
                تسجيل الدخول
            </button>
        </div>

        <!-- Register Form -->
        <div id="register-form" style="display:none;">
            <div class="form-group">
                <label class="form-label">الاسم الكامل</label>
                <input type="text" id="reg-name" class="form-input" placeholder="د. أحمد محمد">
            </div>
            <div class="form-group">
                <label class="form-label">البريد الإلكتروني</label>
                <input type="email" id="reg-email" class="form-input" placeholder="doctor@example.com">
            </div>
            <div class="form-group">
                <label class="form-label">كلمة المرور</label>
                <input type="password" id="reg-password" class="form-input" placeholder="••••••••">
                <label style="display:flex;gap:6px;align-items:center;margin-top:8px;font-size:12px;color:var(--text-muted);">
                    <input type="checkbox" onchange="togglePassword('reg-password', this.checked)">
                    إظهار كلمة المرور
                </label>
            </div>
            <div id="reg-error" style="color:var(--overwhelmed);font-size:13px;margin-bottom:12px;display:none;border-radius:8px;padding:8px 12px;background:rgba(239,68,68,0.08);"></div>
            <button class="btn btn-primary btn-lg" style="width:100%" onclick="doRegister()">
                إنشاء حساب
            </button>
        </div>

        <div class="login-footer">
            <p>VR Assessment Platform for ASD/ADHD</p>
        </div>
    </div>
</div>

<script src="/static/js/core.js"></script>
<script>
    if (API.isLoggedIn()) window.location.href = '/dashboard';

    function showRegister() {
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('register-form').style.display = 'block';
        document.getElementById('tab-login').classList.remove('active');
        document.getElementById('tab-register').classList.add('active');
    }
    function togglePassword(id, show) {
        const el = document.getElementById(id);
        el.type = show ? 'text' : 'password';
    }
    function showLogin() {
        document.getElementById('login-form').style.display = 'block';
        document.getElementById('register-form').style.display = 'none';
        document.getElementById('tab-login').classList.add('active');
        document.getElementById('tab-register').classList.remove('active');
    }

    async function doLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errEl = document.getElementById('error-msg');
        errEl.style.display = 'none';
        try {
            const data = await API.post('/api/auth/login', { email, password });
            API.setToken(data.access_token);
            window.location.href = '/dashboard';
        } catch (e) {
            errEl.textContent = 'بريد إلكتروني أو كلمة مرور خاطئة';
            errEl.style.display = 'block';
        }
    }

    async function doRegister() {
        const full_name = document.getElementById('reg-name').value;
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;
        const errEl = document.getElementById('reg-error');
        errEl.style.display = 'none';
        try {
            await API.post('/api/auth/register', { full_name, email, password });
            const data = await API.post('/api/auth/login', { email, password });
            API.setToken(data.access_token);
            window.location.href = '/dashboard';
        } catch (e) {
            errEl.textContent = e.message || 'حدث خطأ';
            errEl.style.display = 'block';
        }
    }

    document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    document.getElementById('reg-password').addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
</script>
</body>
</html>
