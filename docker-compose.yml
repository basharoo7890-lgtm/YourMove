version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: yourmove
      POSTGRES_USER: yourmove
      POSTGRES_PASSWORD: yourmove_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yourmove"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production}"
      DATABASE_URL: "postgresql+asyncpg://yourmove:yourmove_secret@db:5432/yourmove"
      ALLOWED_ORIGINS: '["http://localhost:3000","http://localhost:5173","http://localhost:8000"]'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
